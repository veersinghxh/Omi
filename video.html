<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebRTC Mobile</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    width:100%;
    min-height:100vh;

    overflow-x:hidden;

    color:white;

    position:relative;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ================= BACKGROUND VIDEO ================= */

.bg-video{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-2;
}

/* DARK OVERLAY */

body::before{
    content:"";

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.55);

    z-index:-1;
}

/* ================= NAVBAR ================= */

.navbar{
    width:95%;
    max-width:1300px;

    margin:15px auto;

    background:rgba(0,0,0,0.75);

    backdrop-filter:blur(10px);

    border-radius:18px;

    padding:18px 30px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    position:fixed;

    top:0;
    left:50%;

    transform:translateX(-50%);

    z-index:999;

    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* LOGO */

.logo{
    color:white;

    font-size:28px;
    font-weight:bold;

    letter-spacing:2px;
}

/* NAV LINKS */

.nav-links{
    display:flex;
    align-items:center;
    gap:35px;
}

.nav-links a{
    color:white;
    text-decoration:none;

    font-size:17px;

    transition:0.3s;

    position:relative;
}

.nav-links a::after{
    content:"";

    position:absolute;

    left:0;
    bottom:-5px;

    width:0%;
    height:2px;

    background:#D9FF3F;

    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

/* CONTACT BUTTON */

.contact-btn{
    background:#D9FF3F;

    color:black !important;

    padding:12px 22px;

    border-radius:30px;

    font-weight:bold;
}

/* MENU ICON */

.menu-btn{
    display:none;

    font-size:32px;

    color:white;

    cursor:pointer;
}

#menu-toggle{
    display:none;
}

/* ================= TITLE ================= */

.title{
    margin-top:130px;

    background:rgba(0,0,0,0.6);

    backdrop-filter:blur(10px);

    padding:18px 28px;

    border-radius:20px;

    font-size:30px;
    font-weight:bold;

    display:flex;
    align-items:center;
    gap:12px;

    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.title span{
    background:#D9FF3F;

    color:black;

    padding:6px 14px;

    border-radius:30px;

    font-size:14px;
}

/* ================= VIDEO SECTION ================= */

.video-container{
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:20px;

    margin-top:35px;
}

.call-video{
    width:420px;
    max-width:90%;

    height:260px;

    border-radius:20px;

    border:3px solid rgba(255,255,255,0.4);

    object-fit:cover;

    background:black;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* ================= CONTROLS ================= */

.controls{
    margin-top:30px;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:15px;
}

.controls input{
    width:320px;
    max-width:90vw;

    padding:15px;

    border:none;

    border-radius:14px;

    outline:none;

    font-size:16px;

    background:rgba(255,255,255,0.15);

    color:white;

    backdrop-filter:blur(10px);
}

.controls input::placeholder{
    color:#ddd;
}

.button-group{
    display:flex;
    gap:15px;

    flex-wrap:wrap;
    justify-content:center;
}

.controls button{
    padding:14px 26px;

    border:none;

    border-radius:14px;

    background:#D9FF3F;

    color:black;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.controls button:hover{
    transform:translateY(-3px);
}

/* ID TEXT */

.id-text{
    margin-top:15px;

    font-size:18px;

    background:rgba(0,0,0,0.55);

    padding:12px 18px;

    border-radius:14px;
}

/* ================= FOOTER ================= */

.footer{
    width:100%;

    background:rgba(0,0,0,0.88);

    margin-top:60px;

    padding-top:40px;

    backdrop-filter:blur(10px);
}

/* SOCIAL ICONS */

.social-icons{
    display:flex;
    justify-content:center;
    gap:18px;

    flex-wrap:wrap;
}

.social-icons a{
    width:52px;
    height:52px;

    border-radius:50%;

    background:white;
    color:black;

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    font-size:22px;

    transition:0.3s;
}

.social-icons a:hover{
    background:#D9FF3F;

    transform:translateY(-5px);
}

/* FOOTER MENU */

.footer-menu{
    margin-top:30px;

    display:flex;
    justify-content:center;

    gap:30px;

    flex-wrap:wrap;
}

.footer-menu a{
    color:#d4d4d4;

    text-decoration:none;

    transition:0.3s;
}

.footer-menu a:hover{
    color:#D9FF3F;
}

/* COPYRIGHT */

.footer-bottom{
    margin-top:35px;

    background:#000;

    padding:18px;

    text-align:center;

    color:#ccc;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    .navbar{
        padding:18px 22px;
    }

    .menu-btn{
        display:block;
    }

    .nav-links{
        position:absolute;

        top:90px;
        left:0;

        width:100%;

        background:rgba(0,0,0,0.92);

        border-radius:20px;

        flex-direction:column;

        max-height:0;

        overflow:hidden;

        transition:0.4s;
    }

    .nav-links a{
        padding:18px 0;
    }

    #menu-toggle:checked ~ .nav-links{
        max-height:500px;

        padding:20px 0;
    }

    .title{
        font-size:22px;

        flex-direction:column;

        text-align:center;

        margin-top:120px;
    }

    .call-video{
        height:220px;
    }

    .footer-menu{
        flex-direction:column;

        align-items:center;

        gap:18px;
    }

}

</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
    <source src="1.mp4" type="video/mp4">
</video>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">LOGO</div>

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="menu-btn">
        ☰
    </label>

    <div class="nav-links">
        <a href="#">About</a>
        <a href="#">Portfolio</a>
        <a href="#">Services</a>
        <a href="#" class="contact-btn">Contact</a>
    </div>

</nav>

<!-- TITLE -->

<h3 class="title">
    📱 WebRTC Mobile
    <span>No Server</span>
</h3>

<!-- VIDEO CALL -->

<div class="video-container">

    <video id="local" autoplay muted playsinline class="call-video"></video>

    <video id="remote" autoplay playsinline class="call-video"></video>

</div>

<!-- CONTROLS -->

<div class="controls">

    <input id="peerId" placeholder="Enter Remote ID">

    <div class="button-group">

        <button onclick="start()">
            Start Camera
        </button>

        <button onclick="callPeer()">
            Call
        </button>

    </div>

    <div class="id-text">
        Your ID:
        <span id="myId">---</span>
    </div>

</div>

<!-- FOOTER -->

<footer class="footer">

    <div class="social-icons">

        <a href="#"><i class="fab fa-facebook-f"></i></a>

        <a href="#"><i class="fab fa-instagram"></i></a>

        <a href="#"><i class="fab fa-twitter"></i></a>

        <a href="#"><i class="fab fa-youtube"></i></a>

    </div>

    <div class="footer-menu">

        <a href="#">Home</a>
        <a href="#">News</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Team</a>

    </div>

    <div class="footer-bottom">
        Copyright © 2025 | Designed By BATPRIME
    </div>

</footer>

<!-- PEER JS -->

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

let peer;
let localStream;

const localVideo = document.getElementById("local");
const remoteVideo = document.getElementById("remote");
const myId = document.getElementById("myId");

/* START CAMERA */

async function start(){

    localStream = await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:true
    });

    localVideo.srcObject = localStream;

    await localVideo.play();

    peer = new Peer();

    peer.on("open", id=>{
        myId.innerText = id;
    });

    peer.on("call", call=>{

        call.answer(localStream);

        call.on("stream", stream=>{

            remoteVideo.srcObject = stream;

            remoteVideo.play();

        });

    });

}
